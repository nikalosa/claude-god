# Example L2 corpus: a judge-graded (rubric) design probe. The rubric turns an
# open-ended architectural answer into per-fact present/absent, scored 0-100 and
# thresholded by pass_score. Requires --level l2 (a Judge is built):
#
#   claude-benchmark run --level l2 --corpus examples/corpus/l2-smoke.yaml \
#     --target <repo> --before <branch> --after <branch>
probes:
  - id: architecture_design
    prompt: "Describe how claude-benchmark compares two Claude environments, end to end."
    rules:
      - id: explains_ab_pipeline
        severity: high
        checks:
          - judge_rubric:
              facts:
                - "runs a corpus of probes against a before environment and an after environment"
                - "samples each probe multiple times per environment (N=3)"
                - "reports what regressed, what improved, and cost/token/time deltas"
              pass_score: 60

  # An open-ended probe: no rules, graded comparatively by the judge
  # (preference, both orderings). Report-only — never a pass/fail or a gate.
  - id: design_tradeoffs
    kind: open_ended
    prompt: "What are the main design tradeoffs in how claude-benchmark grades probes?"
